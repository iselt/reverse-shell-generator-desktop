name: Build Desktop (3×2)

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 3 platforms × 2 architectures:
#   Windows x64 / Windows arm64
#   macOS x64   / macOS arm64
#   Linux x64   / Linux arm64
permissions:
  contents: write

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            platform: windows
            args: --target x86_64-pc-windows-msvc
          - name: windows-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            arch: arm64
            platform: windows
            args: --target aarch64-pc-windows-msvc
          - name: macos-x64
            os: macos-15
            target: x86_64-apple-darwin
            arch: x64
            platform: macos
            args: --target x86_64-apple-darwin
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            arch: arm64
            platform: macos
            args: --target aarch64-apple-darwin
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            platform: linux
            args: --target x86_64-unknown-linux-gnu
          - name: linux-arm64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
            platform: linux
            args: --target aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend tools
        run: npm ci

      - name: Build Tauri app (PR / branch)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_PROXY: localhost,127.0.0.1,::1
        with:
          projectPath: .
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          uploadUnsignedWindows: true

      - name: Build Tauri app (tag release)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_PROXY: localhost,127.0.0.1,::1
        with:
          projectPath: .
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: Reverse Shell Generator ${{ github.ref_name }}
          releaseBody: |
            Desktop builds (Tauri 2 / system WebView).

            | Artifact pattern | Platform |
            | --- | --- |
            | `*-setup.exe` / `*.msi` | Windows |
            | `*.dmg` / `*.app.tar.gz` | macOS |
            | `*.AppImage` / `*.deb` | Linux |

            Network: app defaults to HTTP(S) proxy `127.0.0.1:7897` (override with `RSG_HTTP_PROXY` / `HTTP_PROXY`).
          releaseDraft: true
          prerelease: false
          uploadUnsignedWindows: true

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ROOT="src-tauri/target/${{ matrix.target }}/release"
          if [[ ! -d "$ROOT" ]]; then
            ROOT="src-tauri/target/release"
          fi
          BUNDLE="$ROOT/bundle"
          echo "Looking for bundles under: $BUNDLE"
          if [[ -d "$BUNDLE" ]]; then
            find "$BUNDLE" -type f \( \
              -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.msi' -o \
              -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o \
              -name '*.rpm' -o -name '*.sig' \
            \) -print -exec cp -v {} artifacts/ \;
          fi
          case "${{ matrix.platform }}" in
            windows)
              if [[ -f "$ROOT/reverse-shell-generator.exe" ]]; then
                cp -v "$ROOT/reverse-shell-generator.exe" "artifacts/reverse-shell-generator-${{ matrix.arch }}.exe"
              fi
              ;;
            *)
              if [[ -f "$ROOT/reverse-shell-generator" ]]; then
                cp -v "$ROOT/reverse-shell-generator" "artifacts/reverse-shell-generator-${{ matrix.platform }}-${{ matrix.arch }}"
              fi
              ;;
          esac
          ls -la artifacts || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reverse-shell-generator-${{ matrix.name }}
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 30
