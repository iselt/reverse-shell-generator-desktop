name: Build Desktop (3×2)

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 3 platforms × 2 architectures:
#   Windows x64 / Windows arm64
#   macOS x64   / macOS arm64
#   Linux x64   / Linux arm64
permissions:
  contents: write

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            platform: windows
            args: --target x86_64-pc-windows-msvc
          - name: windows-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            arch: arm64
            platform: windows
            args: --target aarch64-pc-windows-msvc
          - name: macos-x64
            os: macos-15
            target: x86_64-apple-darwin
            arch: x64
            platform: macos
            args: --target x86_64-apple-darwin
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            arch: arm64
            platform: macos
            args: --target aarch64-apple-darwin
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            platform: linux
            args: --target x86_64-unknown-linux-gnu
          - name: linux-arm64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
            platform: linux
            args: --target aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # @tauri-apps/cli needs its platform optional natives.
      # Parcel is optional only (may fail soft on win32-arm64) and is not used for desktop builds.
      - name: Install Tauri CLI
        run: npm install --no-fund --no-audit

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_PROXY: localhost,127.0.0.1,::1
        with:
          projectPath: .
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          uploadUnsignedWindows: true

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "artifacts/${{ matrix.name }}"
          ROOT="src-tauri/target/${{ matrix.target }}/release"
          if [[ ! -d "$ROOT" ]]; then
            ROOT="src-tauri/target/release"
          fi
          BUNDLE="$ROOT/bundle"
          echo "Looking for bundles under: $BUNDLE"
          if [[ -d "$BUNDLE" ]]; then
            find "$BUNDLE" -type f \( \
              -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.msi' -o \
              -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o \
              -name '*.rpm' -o -name '*.sig' \
            \) -print -exec cp -v {} "artifacts/${{ matrix.name }}/" \;
          fi
          case "${{ matrix.platform }}" in
            windows)
              if [[ -f "$ROOT/reverse-shell-generator.exe" ]]; then
                cp -v "$ROOT/reverse-shell-generator.exe" \
                  "artifacts/${{ matrix.name }}/reverse-shell-generator-windows-${{ matrix.arch }}.exe"
              fi
              ;;
            *)
              if [[ -f "$ROOT/reverse-shell-generator" ]]; then
                cp -v "$ROOT/reverse-shell-generator" \
                  "artifacts/${{ matrix.name }}/reverse-shell-generator-${{ matrix.platform }}-${{ matrix.arch }}"
              fi
              ;;
          esac
          find "artifacts/${{ matrix.name }}" -type f -print || true
          test -n "$(find "artifacts/${{ matrix.name }}" -type f | head -1)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reverse-shell-generator-${{ matrix.name }}
          path: artifacts/${{ matrix.name }}/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: reverse-shell-generator-*
          merge-multiple: true

      - name: Prepare asset flat directory
        run: |
          set -euo pipefail
          mkdir -p dist-release
          find release-assets -type f | while read -r f; do
            base="$(basename "$f")"
            dest="dist-release/$base"
            if [[ -e "$dest" ]]; then
              parent="$(basename "$(dirname "$f")")"
              dest="dist-release/${parent}-${base}"
            fi
            cp -v "$f" "$dest"
          done
          ls -lah dist-release
          test -n "$(ls -A dist-release)"

      - name: Publish continuous release (main)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous Build
          body: |
            Automatic desktop builds from `${{ github.ref_name }}` (`${{ github.sha }}`).

            | Matrix | Package patterns |
            | --- | --- |
            | Windows x64 / arm64 | `.msi`, `.exe` |
            | macOS x64 / arm64 | `.dmg`, `.app.tar.gz` |
            | Linux x64 / arm64 | `.AppImage`, `.deb` |

            **Network:** defaults to HTTP(S) proxy `127.0.0.1:7897` (`RSG_HTTP_PROXY` / `HTTP_PROXY` to override).

            Engine: Tauri 2 + system WebView (WebView2 / WKWebView / WebKitGTK).
          prerelease: true
          make_latest: false
          files: dist-release/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish versioned release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Reverse Shell Generator ${{ github.ref_name }}
          body: |
            Desktop builds for **${{ github.ref_name }}** (commit `${{ github.sha }}`).

            | Matrix | Package patterns |
            | --- | --- |
            | Windows x64 / arm64 | `.msi`, `.exe` |
            | macOS x64 / arm64 | `.dmg`, `.app.tar.gz` |
            | Linux x64 / arm64 | `.AppImage`, `.deb` |

            **Network:** defaults to HTTP(S) proxy `127.0.0.1:7897` (`RSG_HTTP_PROXY` / `HTTP_PROXY` to override).

            Engine: Tauri 2 + system WebView (WebView2 / WKWebView / WebKitGTK).
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: dist-release/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
